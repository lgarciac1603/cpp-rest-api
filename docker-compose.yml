version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_minimal
    restart: unless-stopped
    environment:
      POSTGRES_USER: apiuser_test
      POSTGRES_PASSWORD: apipass_test
      POSTGRES_DB: apidb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
